<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lakshay Kumar Resume</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f6f7f9;
      color: #111827;
      font-family: Arial, Helvetica, sans-serif;
    }
    main {
      width: min(92vw, 520px);
      padding: 32px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      box-shadow: 0 12px 32px rgba(17, 24, 39, 0.08);
      text-align: center;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
    }
    p {
      margin: 0 0 24px;
      color: #4b5563;
      line-height: 1.5;
    }
    a {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 6px;
      background: #111827;
      color: #ffffff;
      font-weight: 700;
      text-decoration: none;
    }
    a:hover { background: #374151; }
  </style>
</head>
<body>
  <main>
    <h1>Lakshay Kumar</h1>
    <p>Senior Full Stack Developer</p>
    <a href="resume_v1.pdf" download>Download Resume</a>

</html>
